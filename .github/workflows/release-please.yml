name: Release Please

on:
  workflow_dispatch:
    inputs:
      release_as:
        description: "Optional forced release version (example: 0.2.0)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Resolve release version
        id: relver
        run: |
          if [ -n "${{ inputs.release_as }}" ]; then
            echo "value=${{ inputs.release_as }}" >> "$GITHUB_OUTPUT"
          elif [ -f VERSION ]; then
            echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Release Please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ steps.relver.outputs.value }}
