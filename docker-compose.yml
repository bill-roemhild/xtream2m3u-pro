name: xtream2m3u-pro

services:
  xtream2m3uV2:
    image: ghcr.io/bill-roemhild/xtream2m3u-pro:latest
    container_name: xtream2m3u-pro
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      # Persistent app/session secret (generated to /data if unset)
      - FLASK_SECRET_FILE=/data/flask_secret_key
      # TLS certificate/key paths for native HTTPS on :5000
      - SSL_CERT_FILE=/data/tls/tls.crt
      - SSL_KEY_FILE=/data/tls/tls.key

      # Persistent credential/profile/playlist/auth stores
      - CREDENTIAL_PROFILE_STORE=/data/credential_profiles.json
      - PLAYLIST_STORE_PATH=/data/saved_playlists.json
      - AUTH_STORE_PATH=/data/auth_users.json
      - AUTH_THROTTLE_STORE_PATH=/data/auth_login_throttle.json

      # Persistent encryption key for upstream service credentials
      - CREDENTIAL_CIPHER_FILE=/data/credential_cipher_key

      # Login throttling / lockout tuning
      - AUTH_MAX_LOGIN_ATTEMPTS=5
      - AUTH_ATTEMPT_WINDOW_SECONDS=300
      - AUTH_LOCKOUT_SECONDS=300

      # Optional self-signed cert subject for first-run cert generation
      # - SSL_CERT_SUBJECT=/CN=your-hostname
    volumes:
      - xtream2m3u_data:/data
    restart: unless-stopped

volumes:
  xtream2m3u_data:
